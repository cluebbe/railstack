services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: railstack
      POSTGRES_USER: railstack
      POSTGRES_PASSWORD: railstack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U railstack"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./railstack-server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://railstack:railstack@db:5432/railstack
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./railstack-client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - server

volumes:
  pgdata:
